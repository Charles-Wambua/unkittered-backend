services:
  postgres:
    image: postgres:16-alpine
    container_name: unkittered-postgres
    environment:
      POSTGRES_DB: unkittered
      POSTGRES_USER: unkittered
      POSTGRES_PASSWORD: unkittered
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unkittered"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: unkittered-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  localstack:
    image: localstack/localstack:3
    container_name: unkittered-localstack
    environment:
      SERVICES: sqs
      DEFAULT_REGION: us-east-1
    ports:
      - "4567:4566"
    volumes:
      - "./scripts/init-localstack.sh:/etc/localstack/init/ready.d/init-localstack.sh"

  api:
    build: .
    container_name: unkittered-api
    ports:
      - "8081:8081"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/unkittered
      DB_USERNAME: unkittered
      DB_PASSWORD: unkittered
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AWS_SQS_ENDPOINT: http://localstack:4566
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
